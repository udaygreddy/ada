# ADA taxonomy — document catalog (HOW/WHERE per document type).
# Provider-agnostic: payroll document types use system "payroll"; the exact
# per-provider report + navigation lives in the connector docs
# (connectors/paychex_export.md, connectors/paylocity_export.md). Accounting/GL
# types use system "intuit" (QuickBooks, read-only). `doc_type` is the canonical
# type used by validation (validate.py). Scalar-only schema (one record per
# item); consumed by scripts/_ada.load_taxonomy.
items:
  # ---------- Payroll provider (Paychex | Paylocity | …) — guided export ----------
  - id: 3a.employee_masterfile
    doc_type: employee_masterfile
    section: "3. Payroll & Core Data"
    label: "Employee Masterfile / Demographics / Job & comp"
    system: payroll
    method: guided-export
    source_hint: "Payroll provider: employee profiles / master data (SSN, pay, W-4)"
    synonyms: "employee masterfile, census, demographics, roster, employee list, employee profile, master control"
    sensitivity: high
    tier: loose-file
  - id: 3b.earnings_codes
    doc_type: earnings_setup
    section: "3. Payroll & Core Data"
    label: "Earnings codes & setup"
    system: payroll
    method: guided-export
    source_hint: "Payroll provider: earnings / pay-type setup"
    synonyms: "earnings codes, pay types, earnings setup"
    sensitivity: low
    tier: loose-file
  - id: 3b.deduction_codes
