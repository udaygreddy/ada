    section: "3. Payroll & Core Data"
    label: "Employee Masterfile / Demographics / Job & comp"
    system: paychex
    method: guided-export
    source_hint: "Paychex: Employee / Census report (CSV)"
    synonyms: "employee masterfile, census, demographics, roster, employee list"
    sensitivity: high
    tier: loose-file
